<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>8782 Fleet Manager | Smart Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ======================== CSS VARIABLES FOR THEMING ======================== */
        :root {
            /* Light Mode Colors */
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            /* Brand Colors */
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #f59e0b;
            --secondary-dark: #d97706;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #fbbf24;
            --info: #06b6d4;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-warning: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            
            /* Table Colors */
            --table-header-bg: #f8fafc;
            --table-row-hover: #f1f5f9;
            --table-border: #e2e8f0;
            
            /* Animation */
            --transition-fast: 150ms ease;
            --transition-normal: 300ms ease;
            --transition-slow: 500ms ease;
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 100%);
            --bg-secondary: #1e1e2e;
            --card-bg: rgba(30, 30, 46, 0.98);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-light: #64748b;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            
            /* Table Colors Dark */
            --table-header-bg: #1e293b;
            --table-row-hover: #334155;
            --table-border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px 16px;
            color: var(--text-primary);
            transition: background var(--transition-normal), color var(--transition-normal);
            position: relative;
        }

        /* App Container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Page animations */
        .page {
            display: none;
            animation: fadeSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .page.active-page {
            display: block;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Cards */
        .soft-card {
            background: var(--card-bg);
            border-radius: 2rem;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .soft-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        /* Headers */
        .card-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        [data-theme="dark"] .card-header {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        /* Search Section */
        .search-section {
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        /* Buttons */
        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            filter: brightness(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 0.75rem;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-readonly {
            background: var(--table-header-bg);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            cursor: default;
        }

        .btn-readonly:hover {
            transform: none;
            box-shadow: none;
        }

        /* Desktop Buttons */
        .desktop-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Mobile Buttons Grid */
        .mobile-buttons {
            display: none;
        }

        /* Search Input */
        .search-wrapper {
            width: 100%;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper input::placeholder {
            color: var(--text-light);
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        /* Table Styles - Enhanced for better display */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: visible;
            scrollbar-width: thin;
            padding: 0;
        }

        .table-wrapper::-webkit-scrollbar {
            height: 6px;
            background: transparent;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.875rem;
        }

        /* Enhanced Table Header */
        .data-table th {
            text-align: left;
            padding: 16px 20px;
            background: var(--table-header-bg);
            color: var(--primary);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 3px solid var(--primary);
            position: relative;
        }

        .data-table th:first-child {
            border-top-left-radius: 12px;
        }

        .data-table th:last-child {
            border-top-right-radius: 12px;
        }

        .data-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--table-border);
            color: var(--text-primary);
            transition: background var(--transition-fast);
            font-size: 0.9rem;
        }

        .data-table tr:hover td {
            background: var(--table-row-hover);
        }

        /* Total Badge styling */
        .total-badge {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.8rem;
            box-shadow: var(--shadow-sm);
            min-width: 85px;
            text-align: center;
        }

        /* Action button in table */
        .view-action-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .view-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            filter: brightness(1.05);
        }

        /* Read-only badge */
        .readonly-badge {
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }

        @media (max-width: 640px) {
            .details-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
                padding: 1rem;
            }
        }

        .detail-card {
            background: linear-gradient(135deg, var(--card-bg), rgba(255,255,255,0.05));
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-color);
            cursor: default;
        }

        .detail-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .detail-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
            font-weight: 700;
        }

        .detail-value {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 6px;
            color: var(--text-primary);
            word-break: break-word;
        }

        /* Action Row - Hidden in read-only mode */
        .action-row {
            padding: 1rem 2rem 2rem;
            display: none;
            gap: 14px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        /* Modal Styles - For alerts only */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all var(--transition-normal);
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: var(--card-bg);
            width: 92%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            color: white;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            transition: transform var(--transition-fast);
            line-height: 1;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .card-header {
                padding: 1rem 1.2rem;
            }

            .card-header h2 {
                font-size: 1.3rem;
            }

            .search-section {
                padding: 1rem 1.2rem;
            }

            .desktop-buttons {
                display: none;
            }

            .mobile-buttons {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-top: 16px;
                width: 100%;
            }

            .mobile-buttons .btn {
                width: 100%;
                justify-content: center;
                padding: 12px 16px;
                font-size: 0.85rem;
            }

            .data-table th,
            .data-table td {
                padding: 12px 12px;
                font-size: 0.7rem;
            }

            .total-badge {
                padding: 4px 8px;
                font-size: 0.7rem;
                min-width: 65px;
            }

            .view-action-btn {
                padding: 4px 10px;
                font-size: 0.65rem;
            }

            .btn {
                padding: 8px 18px;
                font-size: 0.8rem;
            }

            .modal-box {
                width: 95%;
                border-radius: 1.5rem;
            }

            .readonly-badge {
                font-size: 0.6rem;
                padding: 3px 8px;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--table-header-bg);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--border-color) 25%, var(--table-header-bg) 50%, var(--border-color) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Hide scrollbars but keep scrolling */
        .table-wrapper::-webkit-scrollbar,
        .modal-box::-webkit-scrollbar,
        .details-grid::-webkit-scrollbar,
        body::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
            display: none;
        }
        
        .table-wrapper,
        .modal-box,
        .details-grid,
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .table-wrapper {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-body {
            overflow-y: auto;
            max-height: calc(85vh - 70px);
            scrollbar-width: none;
        }
        
        @media (max-width: 768px) {
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- PAGE 1 - LIST -->
        <div id="page1" class="page active-page">
            <div class="soft-card">
                <div class="card-header">
                    <h2>🚛 8782 · Fleet Manager</h2>
                    
                    <!-- Desktop Buttons - Read Only Mode -->
                    <div class="desktop-buttons">
                       <!-- <span class="readonly-badge">🔒 Read Only</span> -->
                        <button id="refreshBtnP1" class="btn btn-outline">
                            <span>⟳</span> Refresh
                        </button>
                    </div>
                </div>
                
                <!-- Search Section -->
                <div class="search-section">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="🔍 Search by LR No, Distributor, Sr No...">
                    </div>
                    
                    <!-- Mobile Buttons -->
                    <div class="mobile-buttons">
                     <!--   <span class="readonly-badge" style="grid-column: 1 / -1; text-align: center; justify-content: center;">🔒 Read Only</span> -->
                        <button id="mobileRefreshBtn" class="btn btn-outline" style="grid-column: 1 / -1;">
                            <span>⟳</span> Refresh
                        </button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Sr. No</th>
                                <th>Date</th>
                                <th>LR No</th>
                                <th>Total Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" style="text-align:center;">
                                    <div class="spinner"></div> Loading trips...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PAGE 2 - DETAIL -->
        <div id="page2" class="page">
            <div class="soft-card">
                <div class="card-header">
                    <h2>📋 Trip Details</h2>
                    <button id="backToPage1Btn" class="btn btn-outline">← Back</button>
                </div>
                <div id="detailsContainer" class="details-grid">
                    <div class="loading-skeleton" style="height: 200px;"></div>
                </div>
                <!-- Action Row Hidden in Read-Only Mode -->
                <div class="action-row">
                    <!-- No Edit or Delete buttons -->
                </div>
                <div style="padding: 1rem 2rem 2rem; text-align: center; border-top: 1px solid var(--border-color);">
                 <!--   <span class="readonly-badge">🔒 View Only Mode - No Edits Allowed</span> -->
                </div>
            </div>
        </div>
    </div>

    <!-- Global Modal Alert -->
    <div id="globalModal" class="modal-overlay">
        <div class="modal-box" style="max-width: 450px;">
            <div class="modal-header">
                <h3 id="modalTitle">Notice</h3>
                <button class="close-modal" id="closeGlobalModal">×</button>
            </div>
            <div class="modal-body">
                <p id="modalMsg" style="font-size: 1rem; line-height: 1.5;"></p>
                <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                    <button id="confirmModalBtn" class="btn btn-primary">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ======================== DARK MODE SYNC ======================== */
        function syncThemeWithParent() {
            const localTheme = localStorage.getItem('user-theme-preference');
            if (localTheme) {
                document.body.setAttribute('data-theme', localTheme);
                document.documentElement.setAttribute('data-theme', localTheme);
            } else {
                try {
                    if (window.parent && window.parent.document.body) {
                        const parentTheme = window.parent.document.body.getAttribute('data-theme');
                        if (parentTheme) {
                            document.body.setAttribute('data-theme', parentTheme);
                            document.documentElement.setAttribute('data-theme', parentTheme);
                        }
                    }
                } catch(e) { }
            }
        }

        window.addEventListener('DOMContentLoaded', syncThemeWithParent);
        window.addEventListener('storage', syncThemeWithParent);
        setInterval(syncThemeWithParent, 1000);
        
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'themeChange') {
                const newTheme = event.data.theme;
                if (newTheme) {
                    document.body.setAttribute('data-theme', newTheme);
                    document.documentElement.setAttribute('data-theme', newTheme);
                }
            }
        });
        
        /* ======================== CONFIGURATION ======================== */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoDds81u8M5N8micA_hoIBgCS7aCFm0NUmwW6XLH4m_fRJ8R9pGqjgFGMeBxBd2dSL/exec";
        const SPREADSHEET_ID = "1GaphoayNzhbQ8RV9z1D45Djr5hsRjUPgyKrtmkjjhGI";
        const SHEET_NAME = "Cam_Bwd_8782";
        
        const CACHE_KEY = "fleet_trips_cache_8782";
        const CACHE_TTL = 15 * 60 * 1000;
        
        let allTrips = [];
        let currentViewTrip = null;
        let searchDebounceTimer = null;
        let preloadInProgress = false;
        
        const dom = {};
        
        function cacheDomElements() {
            dom.page1 = document.getElementById('page1');
            dom.page2 = document.getElementById('page2');
            dom.tableBody = document.getElementById('tableBody');
            dom.searchInput = document.getElementById('searchInput');
            dom.refreshBtn = document.getElementById('refreshBtnP1');
            dom.mobileRefreshBtn = document.getElementById('mobileRefreshBtn');
            dom.backBtn = document.getElementById('backToPage1Btn');
            dom.detailsContainer = document.getElementById('detailsContainer');
            dom.globalModal = document.getElementById('globalModal');
            dom.modalTitle = document.getElementById('modalTitle');
            dom.modalMsg = document.getElementById('modalMsg');
        }
        
        /* ======================== DATE FORMATTING FUNCTIONS (UI ONLY) ======================== */
        function formatToDDMMYYYY(dateInput) {
            if (!dateInput || dateInput === '') return '—';
            
            try {
                if (typeof dateInput === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateInput)) {
                    const [year, month, day] = dateInput.split('-');
                    return `${day}/${month}/${year}`;
                }
                
                if (typeof dateInput === 'string' && /^\d{2}\/\d{2}\/\d{4}$/.test(dateInput)) {
                    return dateInput;
                }
                
                const dateObj = new Date(dateInput);
                if (!isNaN(dateObj.getTime())) {
                    const year = dateObj.getFullYear();
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const day = String(dateObj.getDate()).padStart(2, '0');
                    return `${day}/${month}/${year}`;
                }
                
                return '—';
            } catch (error) {
                console.error('Date display formatting error:', error);
                return '—';
            }
        }
        
        function formatDisplayDate(dateInput) {
            if (!dateInput) return '—';
            const formatted = formatToDDMMYYYY(dateInput);
            return formatted || '—';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        /* ======================== UPDATED TOTAL CALCULATION ======================== */
        /* Removed: Food Amt, Advance, NEFT Date, NEFT Amt */
        function computeTotal(trip) {
            const sal = parseFloat(trip["Salary"]) || 0;
            const cng = parseFloat(trip["CNG Cost"]) || 0;
            const unload = parseFloat(trip["Unloading Charge"]) || 0;
            return (sal + cng + unload).toFixed(2);
        }
        
        function showModal(msg, title = "Message", autoClose = 0) {
            if (!dom.globalModal) return;
            dom.modalTitle.innerText = title;
            dom.modalMsg.innerHTML = msg;
            dom.globalModal.classList.add('active');
            if (autoClose > 0) setTimeout(() => dom.globalModal.classList.remove('active'), autoClose);
        }
        
        function showSpinner(element, show, customHtml = null) {
            if (!element) return;
            if (show) {
                element.disabled = true;
                const originalText = element.innerHTML;
                element.setAttribute('data-original-text', originalText);
                element.innerHTML = customHtml || '<span class="spinner"></span> Loading...';
            } else {
                element.disabled = false;
                const original = element.getAttribute('data-original-text');
                if (original) element.innerHTML = original;
            }
        }
        
        async function fetchWithBackgroundCache(url, cacheKey, ttl) {
            const cached = localStorage.getItem(cacheKey);
            let cachedData = null;
            
            if (cached) {
                try {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < ttl) {
                        cachedData = data;
                    }
                } catch (e) { }
            }
            
            if (cachedData && !preloadInProgress) {
                fetchFreshDataInBackground(url, cacheKey);
                return cachedData;
            }
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                if (result.status === "success" && Array.isArray(result.data)) {
                    localStorage.setItem(cacheKey, JSON.stringify({
                        data: result.data,
                        timestamp: Date.now()
                    }));
                    return result.data;
                }
                return [];
            } catch (err) {
                console.error("Fetch error:", err);
                return cachedData || [];
            }
        }
        
        async function fetchFreshDataInBackground(url, cacheKey) {
            preloadInProgress = true;
            try {
                const response = await fetch(url);
                const result = await response.json();
                if (result.status === "success" && Array.isArray(result.data)) {
                    localStorage.setItem(cacheKey, JSON.stringify({
                        data: result.data,
                        timestamp: Date.now()
                    }));
                    
                    if (cacheKey === CACHE_KEY && result.data.length !== allTrips.length) {
                        allTrips = result.data;
                        renderTablePage1(dom.searchInput?.value || "");
                    }
                }
            } catch (err) {
                console.warn("Background fetch failed:", err);
            } finally {
                preloadInProgress = false;
            }
        }
        
        async function loadTripsFast() {
            const url = `${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SHEET_NAME}&_=${Date.now()}`;
            const data = await fetchWithBackgroundCache(url, CACHE_KEY, CACHE_TTL);
            allTrips = data;
            return allTrips;
        }
        
        function renderTablePage1(filter = "") {
            if (!dom.tableBody) return;
            const searchLower = filter.toLowerCase();
            let filtered = allTrips.filter(t => {
                const lr = (t["LR No"] || "").toString().toLowerCase();
                const dist = (t["Distributor"] || "").toString().toLowerCase();
                const sr = (t["Sr. No"] || "").toString().toLowerCase();
                return lr.includes(searchLower) || dist.includes(searchLower) || sr.includes(searchLower);
            });
            
            if (!filtered.length) {
                dom.tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">✨ No trips found</td></tr>';
                return;
            }
            
            const fragment = document.createDocumentFragment();
            filtered.forEach(t => {
                const row = document.createElement('tr');
                const totalAmount = parseFloat(computeTotal(t)).toLocaleString();
                const displayDate = formatDisplayDate(t["Date"]);
                row.innerHTML = `
                    <td><strong>${escapeHtml(t["Sr. No"] || "")}</strong></td>
                    <td>${escapeHtml(displayDate)}</td>
                    <td>${escapeHtml(t["LR No"] || "")}</td>
                    <td><span class="total-badge">₹ ${totalAmount}</span></td>
                    <td><button class="view-action-btn" data-sr="${escapeHtml(t["Sr. No"] || "")}">👁️ View</button></td>
                `;
                fragment.appendChild(row);
            });
            dom.tableBody.innerHTML = '';
            dom.tableBody.appendChild(fragment);
            dom.tableBody.querySelectorAll('.view-action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const srVal = btn.getAttribute('data-sr');
                    const found = allTrips.find(tr => String(tr["Sr. No"]) === String(srVal));
                    if (found) {
                        currentViewTrip = found;
                        showPage2(found);
                    }
                });
            });
        }
        
        /* ======================== UPDATED DETAIL FIELDS ======================== */
        /* Removed: Food Amt, Advance, NEFT Date, NEFT Amt */
        function showPage2(trip) {
            if (!dom.detailsContainer) return;
            const fields = ["Sr. No", "Trip No", "Date", "SO No", "LR No", "Start KM", "End KM", "Distance",
                "Salary", "CNG Tank", "CNG Rate", "CNG Cost",
                "Destination", "Distributor", "Unloading Charge", "EWay Bill No", "Note"];
            const fragment = document.createDocumentFragment();
            fields.forEach(f => {
                let val = trip[f] !== undefined ? trip[f] : '';
                if (f === 'Date') val = formatDisplayDate(val);
                const card = document.createElement('div');
                card.className = 'detail-card';
                card.innerHTML = `<div class="detail-label">${f}</div><div class="detail-value">${escapeHtml(String(val)) || '—'}</div>`;
                fragment.appendChild(card);
            });
            dom.detailsContainer.innerHTML = '';
            dom.detailsContainer.appendChild(fragment);
            dom.page1?.classList.remove('active-page');
            dom.page2?.classList.add('active-page');
        }
        
        function goToPage1() {
            dom.page2?.classList.remove('active-page');
            dom.page1?.classList.add('active-page');
            refreshInBackground();
        }
        
        async function refreshInBackground() {
            const url = `${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SHEET_NAME}&_=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === "success" && Array.isArray(result.data)) {
                allTrips = result.data;
                localStorage.setItem(CACHE_KEY, JSON.stringify({ data: result.data, timestamp: Date.now() }));
                renderTablePage1(dom.searchInput?.value || "");
            }
        }
        
        async function refreshAllData() {
            if (dom.refreshBtn) showSpinner(dom.refreshBtn, true);
            try {
                localStorage.removeItem(CACHE_KEY);
                allTrips = await loadTripsFast();
                renderTablePage1(dom.searchInput?.value || "");
            } catch (err) {
                console.error("Refresh error:", err);
            } finally {
                if (dom.refreshBtn) showSpinner(dom.refreshBtn, false);
            }
        }
        
        async function fastInit() {
            cacheDomElements();
            if (dom.tableBody) dom.tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;"><div class="spinner"></div> Loading trips...</td></tr>';
            await loadTripsFast();
            renderTablePage1("");
            setTimeout(() => { refreshInBackground(); }, 3000);
            
            dom.refreshBtn?.addEventListener('click', async () => { 
                if (dom.refreshBtn) showSpinner(dom.refreshBtn, true); 
                try { 
                    localStorage.removeItem(CACHE_KEY); 
                    allTrips = await loadTripsFast(); 
                    renderTablePage1(dom.searchInput?.value || ""); 
                } catch (err) { 
                    showModal("❌ Refresh failed: " + err.message, "Error"); 
                } finally { 
                    if (dom.refreshBtn) showSpinner(dom.refreshBtn, false); 
                } 
            });
            
            if (dom.mobileRefreshBtn) dom.mobileRefreshBtn.addEventListener('click', async () => { 
                if (dom.mobileRefreshBtn) showSpinner(dom.mobileRefreshBtn, true); 
                try { 
                    localStorage.removeItem(CACHE_KEY); 
                    allTrips = await loadTripsFast(); 
                    renderTablePage1(dom.searchInput?.value || ""); 
                } catch (err) { 
                    showModal("❌ Refresh failed: " + err.message, "Error"); 
                } finally { 
                    if (dom.mobileRefreshBtn) showSpinner(dom.mobileRefreshBtn, false); 
                } 
            });
            
            dom.backBtn?.addEventListener('click', goToPage1);
            dom.searchInput?.addEventListener('input', (e) => { 
                if (searchDebounceTimer) clearTimeout(searchDebounceTimer); 
                searchDebounceTimer = setTimeout(() => renderTablePage1(e.target.value), 300); 
            });
            
            document.getElementById('closeGlobalModal')?.addEventListener('click', () => dom.globalModal?.classList.remove('active'));
            document.getElementById('confirmModalBtn')?.addEventListener('click', () => dom.globalModal?.classList.remove('active'));
            
            window.onclick = (e) => { 
                if (e.target.classList?.contains('modal-overlay')) e.target.classList.remove('active'); 
            };
        }
        
        fastInit();
    </script>
</body>
